name: RDP
on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
      - name: Set RDP password
        run: net user runneradmin "P@ssw0rd123!" /Y
        shell: cmd

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        shell: powershell

      - name: Download ngrok
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path "ngrok.zip" -DestinationPath "."
          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_TOKEN }}
        shell: powershell

      - name: Start ngrok and keep alive
        run: |
          $proc = Start-Process .\ngrok.exe -ArgumentList "tcp 3389 --log=stdout --log-format=logfmt" -PassThru -RedirectStandardOutput ngrok.log
          Start-Sleep -Seconds 15
          $tunnel = (Invoke-RestMethod http://127.0.0.1:4040/api/tunnels).tunnels[0].public_url
          Write-Host "================================================"
          Write-Host "RDP ADDRESS: $tunnel"
          Write-Host "USERNAME: runneradmin"
          Write-Host "PASSWORD: P@ssw0rd123!"
          Write-Host "================================================"
          # Print address again every 5 min and verify ngrok is still running
          for ($i=0; $i -lt 70; $i++) {
            Start-Sleep -Seconds 300
            if ($proc.HasExited) {
              Write-Host "ngrok died, restarting..."
              $proc = Start-Process .\ngrok.exe -ArgumentList "tcp 3389 --log=stdout --log-format=logfmt" -PassThru -RedirectStandardOutput ngrok.log
              Start-Sleep -Seconds 15
              $tunnel = (Invoke-RestMethod http://127.0.0.1:4040/api/tunnels).tunnels[0].public_url
              Write-Host "NEW RDP ADDRESS: $tunnel"
            } else {
              Write-Host "Still alive at minute $($i*5). Address: $tunnel"
            }
          }
        shell: powershell
